<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 简约笔记</title>
    <style>
        :root {
            --primary: #FF8C42; --primary-dark: #E07535; --secondary: #FF6B6B;
            --text-dark: #2D2D2D; --text-medium: #5A5A5A; --text-light: #8A8A8A;
            --bg-white: #FFFFFF; --bg-warm: #FFF9F5; --bg-soft: #FFF0E6;
            --shadow-sm: 0 2px 8px rgba(255, 140, 66, 0.1); --shadow-md: 0 8px 32px rgba(255, 140, 66, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: var(--text-dark); background: var(--bg-warm); line-height: 1.6;
        }
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 1rem 2rem; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px); box-shadow: var(--shadow-sm);
        }
        .nav-content {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-dark); }
        .nav-logo-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.2rem;
        }
        .nav-logo-text { font-size: 1.25rem; font-weight: 700; }
        .nav-back { text-decoration: none; color: var(--text-medium); font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
        .nav-back:hover { color: var(--primary); }
        .page-content { max-width: 800px; margin: 0 auto; padding: 7rem 2rem 4rem; }
        .page-title {
            font-size: 2rem; font-weight: 800; margin-bottom: 1rem; text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-subtitle { text-align: center; color: var(--text-medium); margin-bottom: 3rem; }
        .contact-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .contact-card {
            background: var(--bg-white); border-radius: 16px; padding: 2rem;
            box-shadow: var(--shadow-sm); transition: transform 0.3s, box-shadow 0.3s;
        }
        .contact-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .contact-icon {
            width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; margin-bottom: 1rem;
        }
        .contact-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .contact-desc { color: var(--text-medium); font-size: 0.95rem; margin-bottom: 1rem; }
        .contact-value { color: var(--primary); font-weight: 600; }
        .footer { background: var(--text-dark); color: rgba(255, 255, 255, 0.7); padding: 3rem 2rem; text-align: center; margin-top: 4rem; }
        .footer a { color: rgba(255, 255, 255, 0.7); text-decoration: none; transition: color 0.2s; }
        .footer a:hover { color: var(--primary); }
        @media (max-width: 600px) { .page-content { padding: 6rem 1.5rem 3rem; } .page-title { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="./scribe-zh.html" class="nav-logo">
                <div class="nav-logo-icon">&#9998;</div>
                <span class="nav-logo-text">简约笔记</span>
            </a>
            <a href="./scribe-zh.html" class="nav-back">&larr; 返回首页</a>
        </div>
    </nav>
    <div class="page-content">
        <h1 class="page-title">联系我们</h1>
        <p class="page-subtitle">我们非常重视您的反馈，欢迎通过以下方式联系我们</p>
        <div class="contact-cards">
            <div class="contact-card">
                <div class="contact-icon">&#128231;</div>
                <h3 class="contact-title">电子邮件</h3>
                <p class="contact-desc">发送邮件至我们的邮箱，我们会尽快回复</p>
                <p class="contact-value">amz042hf@outlook.com</p>
            </div>
            <div class="contact-card">
                <div class="contact-icon">&#128222;</div>
                <h3 class="contact-title">应用内反馈</h3>
                <p class="contact-desc">在设置中点击"问题反馈"提交您的意见</p>
                <p class="contact-value">打开简约笔记 > 设置 > 问题反馈</p>
            </div>
            <div class="contact-card">
                <div class="contact-icon">&#128197;</div>
                <h3 class="contact-title">工作时间</h3>
                <p class="contact-desc">我们的工作时间</p>
                <p class="contact-value">周六、周日 9:00 - 18:00</p>
                <p class="contact-desc">我们采用邮件批量处理制，每周六、周日由专家团队集中回复，以确保回复的准确性和一致性。工作日收到的邮件将在周末统一处理，感谢您的理解！</p>

            </div>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 简约笔记. All rights reserved.</p>
        <p style="margin-top: 0.5rem;"><a href="./scribe-zh.html">返回首页</a></p>
    </footer>
</body>
</html>
